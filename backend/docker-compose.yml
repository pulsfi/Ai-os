# OS AI Backend — local stack: API + PostgreSQL + Redis.
# Usage:  docker compose up -d          (full stack)
#         docker compose up -d db redis (infra only; run API on the host)
services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Load API keys + settings from backend/.env on the server (gitignored,
    # survives `git reset --hard`). Optional so a missing file never breaks
    # the deploy. Anything in `environment:` below overrides it.
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://osai:osai@db:5432/osai
      REDIS_URL: redis://redis:6379/0
      # The fleet + agent pipeline must start themselves on every boot —
      # this is what makes trades happen on the server, not just locally.
      BOTS_AUTOSTART: "true"
      AGENTS_RUNTIME_ENABLED: "true"
      # Vault folders are bundled into the image at /app/vault (see deploy),
      # so the Agents + Memory pages find their markdown on the server.
      VAULT_PATH: /app/vault
      # Ledgers + tuning on a named volume so a redeploy never wipes the
      # paper record (default paths are under /app/data).
      BOTS_DB_PATH: /app/data/paper_bots.db
      LIVE_TRADES_DB_PATH: /app/data/live_trades.db
      BOTS_OVERRIDES_PATH: /app/data/bot_overrides.json
    volumes:
      - botdata:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: osai
      POSTGRES_PASSWORD: osai
      POSTGRES_DB: osai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osai"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  botdata:
