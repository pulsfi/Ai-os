# OS AI reverse proxy. Rendered by nginx's envsubst from ${DOMAIN}.
#
# Security note: the backend has NO authentication of its own — anyone who
# can reach it could stop your bots, read your vault, or trigger the kill
# switch. So the ENTIRE app sits behind HTTP Basic Auth here. Generate the
# htpasswd file during setup (see DEPLOY.md).

# WebSocket upgrade helper (http context — conf.d files load here).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- HTTP :80 — ACME challenge + redirect everything else to HTTPS ---
server {
    listen 80;
    server_name ${DOMAIN};

    # Let's Encrypt reaches this without auth or redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS :443 — the real app ---
server {
    listen 443 ssl;
    http2 on;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Password wall over the whole site.
    auth_basic "OS AI";
    auth_basic_user_file /etc/nginx/htpasswd;

    client_max_body_size 2m;

    # Backend API + docs.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade for the live fleet stream (/api/v1/ws) and the
        # chat SSE stream — long timeouts, no buffering.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    # Everything else -> the Next.js frontend.
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
