name: Deploy AI OS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Fail the run on ANY error — a broken backend deploy must never
            # report success (it did once: a malformed .env line made compose
            # bail out silently and the backend ran a stale image for hours).
            set -e

            cd ${{ secrets.VPS_APP_DIR }}

            git fetch origin
            git reset --hard origin/main

            # Bundle the vault folders into the backend build context so the
            # Agents + Memory pages have their markdown inside the image.
            rm -rf backend/vault
            mkdir -p backend/vault
            cp -r "04 Agents" "10 Memory" "12 Daily Notes" "00 Dashboard" backend/vault/ 2>/dev/null || true

            cd backend

            # Heal .env: docker compose rejects the WHOLE file if one line is
            # malformed (e.g. a space in a key name). Comment such lines out
            # so the deploy proceeds, and print a masked hint (never values).
            # NB: .env may be root-owned (edited with sudo), so never write
            # into it directly — build a healed copy and mv it into place
            # (a rename only needs directory permission, not file permission).
            if [ -f .env ]; then
              cp -f .env .env.bak
              awk '{
                if ($0 ~ /^[[:space:]]*$/ || $0 ~ /^[[:space:]]*#/ || $0 ~ /^[A-Za-z_][A-Za-z0-9_]*=/) print $0;
                else print "# DISABLED (bad syntax - fix and re-add): " substr($0, 1, 12) "...";
              }' .env.bak > .env.healed
              if cmp -s .env.healed .env; then
                rm -f .env.healed
              else
                echo "WARNING: malformed line(s) in backend/.env were disabled:"
                grep -n "^# DISABLED" .env.healed || true
                mv -f .env.healed .env || {
                  echo "ERROR: cannot replace backend/.env (root-owned?)."
                  echo "Fix on the VPS:  sudo chown $(whoami) backend/.env"
                  exit 1
                }
              fi
            fi

            docker compose up -d --build

            cd ../frontend
            docker build \
              --build-arg NEXT_PUBLIC_API_URL=https://nexusa.me \
              --build-arg NEXT_PUBLIC_WS_URL=wss://nexusa.me \
              -t ai-os-frontend .

            docker rm -f ai-os-frontend || true

            docker run -d \
              --name ai-os-frontend \
              --restart unless-stopped \
              -p 3000:3000 \
              ai-os-frontend

            docker image prune -f
