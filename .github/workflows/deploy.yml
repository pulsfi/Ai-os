name: Deploy AI OS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_APP_DIR }}

            git fetch origin
            git reset --hard origin/main

            cd backend
            docker compose up -d --build

            cd ../frontend
            docker build \
              --build-arg NEXT_PUBLIC_API_URL=https://nexusa.me \
              --build-arg NEXT_PUBLIC_WS_URL=wss://nexusa.me \
              -t ai-os-frontend .

            docker rm -f ai-os-frontend || true

            docker run -d \
              --name ai-os-frontend \
              --restart unless-stopped \
              -p 3000:3000 \
              ai-os-frontend

            docker image prune -f
